name: Pokedesk Backend

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup=python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -r requirement.txt

      - name: Run test
        run:  |
          pytest -v
          
